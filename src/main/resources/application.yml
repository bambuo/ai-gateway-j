server:
  port: 8443

spring:
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null

logging:
  level:
    ai.gateway: INFO
  pattern:
    console: "[%d{ISO8601}] [%-5level] %msg%n"

gateway:
  upstream: https://api.anthropic.com
  auth:
    tokens:
      - name: default
        token: placeholder
  oauth:
    refresh_token: placeholder
  identity:
    device_id: placeholder
    email: placeholder
  env:
    platform: darwin
    platform_raw: darwin
    arch: arm64
    node_version: 22.0.0
    terminal: xterm
    version: 2.1.81
    build_time: "2025-01-01T00:00:00Z"
    is_ci: false
    is_claude_ai_auth: true
  prompt_env:
    platform: darwin
    shell: zsh
    os_version: Darwin 24.4.0
    working_dir: /Users/jack/projects
  process:
    constrained_memory: 17179869184
    rss_range: [ 300000000, 600000000 ]
    heap_total_range: [ 400000000, 700000000 ]
    heap_used_range: [ 200000000, 500000000 ]
  logging:
    audit: false
